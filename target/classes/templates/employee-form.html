<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工表单 - 员工管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/employees">员工管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/employees">员工管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departments">部门管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2 th:if="${employeeDTO.id}">编辑员工</h2>
                <h2 th:unless="${employeeDTO.id}">添加员工</h2>
            </div>
            <div class="col-md-6 text-end">
                <a href="/employees" class="btn btn-secondary">返回列表</a>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/employees/save}" method="post" th:object="${employeeDTO}">
            <input type="hidden" th:field="*{id}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                    <div th:if="${#fields.hasErrors('name')}" class="text-danger">
                        <span th:errors="*{name}"></span>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="gender" class="form-label">性别</label>
                    <select class="form-select" id="gender" th:field="*{gender}">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="age" class="form-label">年龄</label>
                    <input type="number" class="form-control" id="age" th:field="*{age}">
                    <div th:if="${#fields.hasErrors('age')}" class="text-danger">
                        <span th:errors="*{age}"></span>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">电话</label>
                    <input type="text" class="form-control" id="phone" th:field="*{phone}">
                    <div th:if="${#fields.hasErrors('phone')}" class="text-danger">
                        <span th:errors="*{phone}"></span>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="position" class="form-label">职位</label>
                    <input type="text" class="form-control" id="position" th:field="*{position}">
                    <div th:if="${#fields.hasErrors('position')}" class="text-danger">
                        <span th:errors="*{position}"></span>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="hireDate" class="form-label">入职时间</label>
                    <input type="date" class="form-control" id="hireDate" th:field="*{hireDate}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="salary" class="form-label">薪水</label>
                    <input type="number" step="0.01" class="form-control" id="salary" th:field="*{salary}">
                    <div th:if="${#fields.hasErrors('salary')}" class="text-danger">
                        <span th:errors="*{salary}"></span>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="departmentId" class="form-label">部门</label>
                    <select class="form-select" id="departmentId" th:field="*{departmentId}">
                        <option value="">请选择部门</option>
                        <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/employees" class="btn btn-secondary ms-2">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
