server:
  port: 8080

spring:
  application:
    name: employee-sys

  datasource:
    url: jdbc:mysql://localhost:3306/employee_sys?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false

logging:
  level:
    com.employeesys: DEBUG
    org.springframework.security: INFO