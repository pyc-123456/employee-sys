server:
  port: 8080

spring:
  application:
    name: employee-sys
  datasource:
    url: jdbc:mysql://localhost:3306/employee_sys?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
  thymeleaf:
    mode: HTML
    encoding: UTF-8
    cache: false

logging:
  level:
    com.employeesys: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    com.employeesys: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  thymeleaf:
    cache: true

logging:
  level:
    com.employeesys: WARN
