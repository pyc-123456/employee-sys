<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工管理 - 员工管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/employees">员工管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="/employees">员工管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departments">部门管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2>员工列表</h2>
            </div>
            <div class="col-md-6 text-end">
                <a href="/employees/add" class="btn btn-primary">添加员工</a>
            </div>
        </div>

        <form th:action="@{/employees}" method="get" class="mb-4">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control" name="name" th:value="${searchName}" placeholder="按名称搜索">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-secondary">搜索</button>
                </div>
                <div class="col-md-2">
                    <a href="/employees" class="btn btn-outline-secondary">重置</a>
                </div>
            </div>
        </form>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>性别</th>
                    <th>年龄</th>
                    <th>电话</th>
                    <th>职位</th>
                    <th>入职时间</th>
                    <th>薪水</th>
                    <th>部门</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="employee : ${employees}">
                    <td th:text="${employee.id}"></td>
                    <td th:text="${employee.name}"></td>
                    <td th:text="${employee.gender}"></td>
                    <td th:text="${employee.age}"></td>
                    <td th:text="${employee.phone}"></td>
                    <td th:text="${employee.position}"></td>
                    <td th:text="${#temporals.format(employee.hireDate, 'yyyy-MM-dd')}"></td>
                    <td th:text="${employee.salary}"></td>
                    <td th:text="${employee.department?.name} ?: '-'"></td>
                    <td>
                        <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                        <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除该员工？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${employees.isEmpty()}">
                    <td colspan="10" class="text-center text-muted">暂无员工数据</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
