<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部门管理 - 员工管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/employees">员工管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/employees">员工管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/departments">部门管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2>部门列表</h2>
            </div>
            <div class="col-md-6 text-end">
                <a href="/departments/add" class="btn btn-primary">添加部门</a>
            </div>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>部门名称</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="department : ${departments}">
                    <td th:text="${department.id}"></td>
                    <td th:text="${department.name}"></td>
                    <td th:text="${department.description} ?: '-'"></td>
                    <td>
                        <a th:href="@{/departments/edit/{id}(id=${department.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                        <a th:href="@{/departments/delete/{id}(id=${department.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除该部门？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${departments.isEmpty()}">
                    <td colspan="4" class="text-center text-muted">暂无部门数据</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
